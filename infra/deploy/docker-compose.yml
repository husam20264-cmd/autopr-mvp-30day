version: '3.8'

services:
  app:
    build:
      context: ../..
      dockerfile: infra/deploy/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../../.env
    volumes:
      - ../../data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
